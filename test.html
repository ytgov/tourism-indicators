<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seasonality Radar Chart</title>
    <script src="https://code.highcharts.com/12.1.0/highcharts.js"></script>
    <script src="https://code.highcharts.com/12.1.0/highcharts-more.js"></script>
    <script src="https://code.highcharts.com/12.1.0/modules/exporting.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.1/papaparse.min.js"></script>
    <script src="https://code.highcharts.com/12.1.0/modules/stock.js"></script>
</head>
<body>
    <div id="container" style="width: 100%; height: 600px;"></div>
    <script>
        // Load the CSV data
        function loadCSV(filePath, callback) {
            Papa.parse(filePath, {
                download: true,
                header: true,
                complete: function(results) {
                    callback(results.data);
                },
                error: function(error) {
                    console.error("Error loading CSV:", error);
                }
            });
        }

        // Function to generate a color gradient
        function generateGradientColors(startColor, endColor, steps) {
            const start = startColor.match(/\d+/g).map(Number);
            const end = endColor.match(/\d+/g).map(Number);
            const gradient = [];
            for (let i = 0; i < steps; i++) {
                const r = Math.round(start[0] + (i * (end[0] - start[0])) / (steps - 1));
                const g = Math.round(start[1] + (i * (end[1] - start[1])) / (steps - 1));
                const b = Math.round(start[2] + (i * (end[2] - start[2])) / (steps - 1));
                gradient.push(`rgb(${r},${g},${b})`);
            }
            return gradient;
        }

        // Process CSV and render the chart
        loadCSV('/data/vw_kpi_air_arrivals_ytd_summary.csv', function(data) {

            // Sort data by date (ascending)
            data.sort((a, b) => new Date(a.date) - new Date(b.date));

            const months = [
                "January", "February", "March", "April", "May", "June",
                "July", "August", "September", "October", "November", "December"
            ];
            
            // Group data by year
            const years = [...new Set(data.map(row => row.year))].sort(); // Ensure chronological order
            const gradientColors = generateGradientColors("rgb(0,0,255)", "rgb(255,0,0)", years.length);

            const seriesData = years.map(year => {
                const monthlyTotals = Array(12).fill(0); // Default to 0 for all months
                data.forEach(row => {
                    if (row.year === year) {
                        const monthIndex = parseInt(row.month, 10) - 1; // Convert to 0-based index
                        monthlyTotals[monthIndex] = parseFloat(row['monthly_total']) || 0;
                    }
                });
                return {
                    name: year,
                    data: monthlyTotals,
                    color: gradientColors[years.indexOf(year)] // Use correct index for color
                };
            });

            // Render the polar chart
            Highcharts.chart('container', {
                chart: {
                    polar: true,
                    type: 'line'
                },
                title: {
                    text: 'Air Arrivals by Month',
                    x: -80
                },
                pane: {
                    size: '80%'
                },
                xAxis: {
                    categories: months,
                    tickmarkPlacement: 'on',
                    lineWidth: 0
                },
                yAxis: {
                    gridLineInterpolation: 'polygon',
                    lineWidth: 0,
                    min: 0
                },
                tooltip: {
                    shared: true,
                    pointFormat: '<span style="color:{series.color}">{series.name}</span>: <b>{point.y:.1f}</b><br/>'
                },
                legend: {
                    align: 'right',
                    verticalAlign: 'top',
                    y: 70,
                    layout: 'vertical'
                },
                series: seriesData.map(series => ({
                    ...series,
                    marker: {
                        enabled: false // Turn off the knobs
                    }
                }))
            });
        });
    </script>
</body>
</html>
